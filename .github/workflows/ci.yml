name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fixture-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate TinyMUX log event fixtures
        run: python3 tests/test_tinymux_log_event_fixtures.py

      - name: Check Python syntax
        run: python3 tests/check_python_syntax.py
